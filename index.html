<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Marc — Will you marry me?</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#ff4d86;
      --muted:#9aa4b2;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{
      background: radial-gradient(1000px 400px at 10% 10%, rgba(255,77,134,0.06), transparent),
                  radial-gradient(800px 300px at 90% 90%, rgba(0,168,255,0.03), transparent),
                  var(--bg);
      color:white;display:flex;align-items:center;justify-content:center;padding:32px;
    }
    .card{
      width:min(860px,95%);background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:20px;padding:36px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(2,6,23,0.6);
      display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:center;
    }
    .left h1{font-size:40px;margin:0 0 8px;letter-spacing:-0.02em}
    .left p{color:var(--muted);margin:0 0 20px}
    .heart{font-size:78px;color:var(--accent);transform:translateY(-4px);}
    .btns{display:flex;gap:12px}
    .btn{padding:14px 22px;border-radius:12px;border:0;font-weight:700;cursor:pointer;font-size:16px}
    .btn-yes{background:linear-gradient(90deg,#ff6a9e,#ff3b7a);color:white}
    .btn-no{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .right{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));border:1px solid rgba(255,255,255,0.02)}
    .ring{width:160px;height:160px;border-radius:50%;display:inline-grid;place-items:center;position:relative}
    .ring::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 8px rgba(255,77,134,0.08)}
    .proposal{font-size:18px;margin-top:14px;color:var(--muted);text-align:center}

    /* Confetti */
    .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .hidden{display:none}

    /* Success overlay */
    .overlay{position:fixed;inset:0;background:linear-gradient(180deg, rgba(15,23,36,0.6), rgba(2,6,23,0.9));display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:28px;border-radius:16px;text-align:center;border:1px solid rgba(255,255,255,0.04)}
    .modal h2{margin:0 0 8px}
    .modal p{color:var(--muted);margin:0 0 18px}
    .close{margin-top:8px;padding:10px 16px;border-radius:10px;border:0}

    /* small screens */
    @media (max-width:720px){
      .card{grid-template-columns:1fr;}
      .right{order:-1}
      .left h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="left">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div class="heart">&#10084;&#65039;</div>
        <div style="font-size:14px;color:var(--muted);font-weight:700;letter-spacing:0.08em">A question for Marc</div>
      </div>
      <h1 id="title">Marc, will u marry me?</h1>
      <p id="subtitle">Im nervous but i love you so much. Click the button and make my day.</p>

      <div class="btns" role="group" aria-label="proposal choices">
        <button class="btn btn-yes" id="yesBtn">Yes!!</button>
        <button class="btn btn-no" id="noBtn">Not yet</button>
      </div>
    </div>

    <div class="right">
      <div class="ring" aria-hidden="true">
        <svg width="110" height="110" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2C8.686 2 6 4.686 6 8c0 4.5 6 10 6 10s6-5.5 6-10c0-3.314-2.686-6-6-6z" stroke="white" stroke-opacity="0.95" stroke-width="0.8"/>
          <circle cx="12" cy="8" r="2.6" fill="white" fill-opacity="0.95"/>
        </svg>
      </div>
      <div class="proposal">You can answer with the buttons, marc.</div>
    </div>
  </div>

  <div class="confetti hidden" id="confetti"></div>

  <div class="overlay hidden" id="overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <h2>He said YES! 🥺💕</h2>
      <p>Im over the moon. Congratulations — you two are shining.</p>
      <button class="close btn-yes" id="closeModal">Close</button>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const confettiEl = document.getElementById('confetti');
    const overlay = document.getElementById('overlay');
    const closeModal = document.getElementById('closeModal');

    function burstConfetti(){
      confettiEl.classList.remove('hidden');
      // create many small pieces
      for(let i=0;i<90;i++){
        const el = document.createElement('div');
        el.style.position='absolute';
        el.style.left = Math.random()*100 + '%';
        el.style.top = '-10%';
        el.style.width = (6+Math.random()*8)+'px';
        el.style.height = (8+Math.random()*8)+'px';
        el.style.opacity = 0.95;
        el.style.transform = 'rotate('+Math.floor(Math.random()*360)+'deg)';
        el.style.background = `hsl(${Math.random()*360}deg 90% 60%)`;
        el.style.borderRadius = '2px';
        el.style.pointerEvents='none';
        el.style.transition = 'transform 2.6s cubic-bezier(.2,.7,.2,1), top 2.6s linear, left 2.6s linear, opacity 0.6s ease 2.2s';
        confettiEl.appendChild(el);
        // animate
        requestAnimationFrame(()=>{
          el.style.top = (60 + Math.random()*60) + '%';
          el.style.left = (Math.random()*120 - 10) + '%';
          el.style.transform = `rotate(${Math.random()*720}deg) translateY(10px)`;
        });
      }
      // remove after 3s
      setTimeout(()=>{
        confettiEl.innerHTML='';
        confettiEl.classList.add('hidden');
      },3200);
    }

    yesBtn.addEventListener('click', ()=>{
      // change title
      document.getElementById('title').textContent = 'Marc said YES!';
      document.getElementById('subtitle').textContent = 'This is the best day ever.';
      burstConfetti();
      overlay.classList.remove('hidden');
    });

    noBtn.addEventListener('click', ()=>{
      // playful dodge: move no button away
      noBtn.style.transform = 'translate(' + (Math.random()*140-70) + 'px,' + (Math.random()*24-12) + 'px)';
    });

    closeModal.addEventListener('click', ()=>{
      overlay.classList.add('hidden');
    });

    // small accessibility: keyboard yes (y) or no (n)
    window.addEventListener('keydown', (e)=>{
      if(e.key.toLowerCase()==='y') yesBtn.click();
      if(e.key.toLowerCase()==='n') noBtn.click();
    });
  </script>
</body>
</html>
