<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4rius5 MiniSite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        /* Splash screen */
        #splash {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1e1e1e;
            color: #f0f0f0;
            flex-direction: column;
        }

        #splash button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4caf50;
            color: white;
        }

        /* Home page */
        #home {
            display: none;
            text-align: center;
            padding: 50px;
            background: #2c2c2c;
            color: #f0f0f0;
            height: 100vh;
        }

        #home button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4caf50;
            color: white;
        }

        /* Careers section */
        #careers {
            margin-top: 30px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <!-- Splash screen -->
    <div id="splash">
        <h1>Click to Open</h1>
        <button onclick="openSite()">Enter</button>
    </div>

    <!-- Home page -->
    <div id="home">
        <h1>Hey there! I am Darius and I'm cool 😎</h1>
        <button onclick="showCareers()">Careers</button>

        <div id="careers">
            <h2>Careers</h2>
            <ul>
                <li>City Airways - Public Relations Member</li>
            </ul>
        </div>
    </div>

    <script>
        function openSite() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        }

        function showCareers() {
            const careers = document.getElementById('careers');
            careers.style.display = (careers.style.display === 'none') ? 'block' : 'none';
        }
    </script>

</body>
</html>
